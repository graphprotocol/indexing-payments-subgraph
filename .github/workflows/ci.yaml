name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate manifest
        run: npm run prepare:hardhat

      - name: Generate types
        run: npx graph codegen

      - name: Build
        run: npx graph build

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test
