type IndexingAgreementAccepted @entity(immutable: true) {
  id: ID!
  indexer: Bytes!
  payer: Bytes!
  agreementId: Bytes!
  allocationId: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type IndexingAgreementCanceled @entity(immutable: true) {
  id: ID!
  indexer: Bytes!
  payer: Bytes!
  agreementId: Bytes!
  canceledBy: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type IndexingAgreementUpdated @entity(immutable: true) {
  id: ID!
  indexer: Bytes!
  payer: Bytes!
  agreementId: Bytes!
  allocationId: Bytes!
  version: Int!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type IndexingFeesCollected @entity(immutable: true) {
  id: ID!
  indexer: Bytes!
  payer: Bytes!
  agreementId: Bytes!
  allocationId: Bytes!
  subgraphDeploymentId: Bytes!
  currentEpoch: BigInt!
  tokensCollected: BigInt!
  entities: BigInt!
  poi: Bytes!
  poiBlockNumber: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type IndexerDeploymentLatest @entity(immutable: false) {
  id: ID!
  indexer: Bytes!
  subgraphDeploymentId: Bytes!
  agreementId: Bytes!
  entities: BigInt!
  tokensCollected: BigInt!
  poiBlockNumber: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}
