"Agreement lifecycle state"
enum AgreementState {
  "Proposed but not yet accepted (reserved for future use — entities are currently only created on accept)"
  NotAccepted
  Accepted
  CanceledByServiceProvider
  CanceledByPayer
}

type IndexingAgreement @entity(immutable: false) {
  "The agreement ID (bytes16)"
  id: Bytes!
  "The payer address"
  payer: Bytes!
  "The indexer address"
  indexer: Bytes!
  "The allocation linked to this agreement"
  allocationId: Bytes!
  "The subgraph deployment ID"
  subgraphDeploymentId: Bytes!
  "Agreement lifecycle state"
  state: AgreementState!
  "Timestamp when the agreement was accepted"
  acceptedAt: BigInt!
  "Timestamp of last collection"
  lastCollectionAt: BigInt!
  "Timestamp when the agreement ends"
  endsAt: BigInt!
  "Maximum tokens for first collection"
  maxInitialTokens: BigInt!
  "Maximum tokens per second for ongoing collections"
  maxOngoingTokensPerSecond: BigInt!
  "Tokens per second from agreement terms"
  tokensPerSecond: BigInt!
  "Tokens per entity per second from agreement terms"
  tokensPerEntityPerSecond: BigInt!
  "Minimum seconds between collections"
  minSecondsPerCollection: Int!
  "Maximum seconds between collections"
  maxSecondsPerCollection: Int!
  "Timestamp when agreement was last updated (0 if never updated)"
  lastUpdatedAt: BigInt!
  "Timestamp when agreement was canceled (0 if not canceled)"
  canceledAt: BigInt!
  "Total tokens collected over lifetime"
  tokensCollected: BigInt!
  "Fee collection history"
  collections: [IndexingFeeCollection!]! @derivedFrom(field: "agreement")
}

type IndexingFeeCollection @entity(immutable: true) {
  id: Bytes!
  agreement: IndexingAgreement!
  currentEpoch: BigInt!
  tokensCollected: BigInt!
  entities: BigInt!
  poi: Bytes!
  poiBlockNumber: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

type IndexerDeploymentLatest @entity(immutable: false) {
  id: ID!
  indexer: Bytes!
  subgraphDeploymentId: Bytes!
  agreementId: Bytes!
  entities: BigInt!
  tokensCollected: BigInt!
  poiBlockNumber: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

# Immutable transition logs. The aggregated IndexingAgreement entity above
# serves current-state queries; these append-only logs serve event-sourcing
# consumers (e.g. dipper's chain_listener polls them since-block to replay
# state transitions into its local DB). Preserving both views lets snapshot
# and streaming consumers share one subgraph.
type IndexingAgreementAccepted @entity(immutable: true) {
  id: ID!
  indexer: Bytes!
  payer: Bytes!
  agreementId: Bytes!
  allocationId: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type IndexingAgreementCanceled @entity(immutable: true) {
  id: ID!
  indexer: Bytes!
  payer: Bytes!
  agreementId: Bytes!
  "Address that initiated the cancel (from SubgraphService canceledOnBehalfOf param)"
  canceledBy: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type IndexingAgreementUpdated @entity(immutable: true) {
  id: ID!
  indexer: Bytes!
  payer: Bytes!
  agreementId: Bytes!
  allocationId: Bytes!
  version: Int!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# Immutable log of every OfferStored event emitted by RecurringCollector.
# OFFER_TYPE_NEW = 0, OFFER_TYPE_UPDATE = 1.
type OfferStored @entity(immutable: true) {
  id: ID!
  agreementId: Bytes!
  payer: Bytes!
  offerType: Int!
  offerHash: Bytes!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

# First stored offer per agreementId, keyed by bytes16 agreement ID.
# Dipper queries this entity as an idempotency gate -- avoids re-submitting
# an offer after a crashed-mid-flight restart where the on-chain tx landed
# but dipper lost track of it.
#
# Declared immutable because, for a given agreementId, the RCA identifying
# fields (payer, dataService, serviceProvider, deadline, nonce) are fixed by
# the id derivation, so any duplicate OfferStored event for the same id would
# carry the same offerHash. The handler enforces this by returning early on
# the second event instead of attempting to overwrite.
type Offer @entity(immutable: true) {
  id: Bytes!
  payer: Bytes!
  offerType: Int!
  offerHash: Bytes!
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  createdAtTx: Bytes!
}
