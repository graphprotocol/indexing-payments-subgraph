"Agreement lifecycle state"
enum AgreementState {
  "Proposed but not yet accepted (reserved for future use — entities are currently only created on accept)"
  NotAccepted
  Accepted
  CanceledByServiceProvider
  CanceledByPayer
}

type IndexingAgreement @entity(immutable: false) {
  "The agreement ID (bytes16)"
  id: Bytes!
  "The payer address"
  payer: Bytes!
  "The indexer address"
  indexer: Bytes!
  "The allocation linked to this agreement"
  allocationId: Bytes!
  "The subgraph deployment ID"
  subgraphDeploymentId: Bytes!
  "Agreement lifecycle state"
  state: AgreementState!
  "Timestamp when the agreement was accepted"
  acceptedAt: BigInt!
  "Transaction hash of the SubgraphService.acceptIndexingAgreement call. Auditable link from the indexed agreement back to the on-chain accept (typically a multicall(startService+acceptIndexingAgreement)). 32-byte zero sentinel if never accepted (entity created from a stray Updated/Canceled event)."
  acceptedAtTx: Bytes!
  "Timestamp of last collection"
  lastCollectionAt: BigInt!
  "Timestamp when the agreement ends"
  endsAt: BigInt!
  "Maximum tokens for first collection"
  maxInitialTokens: BigInt!
  "Maximum tokens per second for ongoing collections"
  maxOngoingTokensPerSecond: BigInt!
  "Tokens per second from agreement terms"
  tokensPerSecond: BigInt!
  "Tokens per entity per second from agreement terms"
  tokensPerEntityPerSecond: BigInt!
  "Minimum seconds between collections"
  minSecondsPerCollection: Int!
  "Maximum seconds between collections"
  maxSecondsPerCollection: Int!
  "Timestamp when agreement was last updated (0 if never updated)"
  lastUpdatedAt: BigInt!
  "Timestamp when agreement was canceled (0 if not canceled)"
  canceledAt: BigInt!
  "Transaction hash of the SubgraphService.cancelIndexingAgreement* call (32-byte zero if not canceled). Mirrors canceledAt/canceledBy for full auditability of the cancel event."
  canceledAtTx: Bytes!
  "Address that initiated the cancel (zero address if not canceled). Taken from SubgraphService.IndexingAgreementCanceled.canceledOnBehalfOf so operator-initiated cancels are captured correctly."
  canceledBy: Bytes!
  "Total tokens collected over lifetime"
  tokensCollected: BigInt!
  "Block number of the latest state change on this agreement (Accepted / Updated / Canceled / RCACollected). Consumers that reconcile state diffs poll with `lastStateChangeBlock_gt` since last seen block."
  lastStateChangeBlock: BigInt!
  "Fee collection history"
  collections: [IndexingFeeCollection!]! @derivedFrom(field: "agreement")
}

type IndexingFeeCollection @entity(immutable: true) {
  id: Bytes!
  agreement: IndexingAgreement!
  currentEpoch: BigInt!
  tokensCollected: BigInt!
  entities: BigInt!
  poi: Bytes!
  poiBlockNumber: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  "Transaction hash of the SubgraphService.collect call that emitted this fee collection. Auditable per-payment link."
  transactionHash: Bytes!
}

type IndexerDeploymentLatest @entity(immutable: false) {
  id: ID!
  indexer: Bytes!
  subgraphDeploymentId: Bytes!
  agreementId: Bytes!
  entities: BigInt!
  tokensCollected: BigInt!
  poiBlockNumber: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
}

# Latest stored offer per agreementId, keyed by bytes16 agreement ID.
# Dipper queries this entity as an idempotency gate -- avoids re-submitting
# an offer after a crashed-mid-flight restart where the on-chain tx landed
# but dipper lost track of it.
#
# Mutable because the contract overwrites the stored offer in two cases:
# (1) an OFFER_TYPE_UPDATE event refreshes the hash and type to the latest
# RCAU terms; (2) an OfferCancelled event stamps `canceledAt` so dipper
# treats `canceledAt > 0` as "no live offer; safe to re-submit." Storage
# stays bounded because there is at most one Offer entity per agreementId.
type Offer @entity(immutable: false) {
  id: Bytes!
  payer: Bytes!
  "Latest offer type observed (1 = OFFER_TYPE_NEW, 2 = OFFER_TYPE_UPDATE)."
  offerType: Int!
  "Latest stored offer hash; tracks the on-chain rcaOffers / rcauOffers entry."
  offerHash: Bytes!
  "Timestamp when the offer was canceled on-chain (0 if currently live)."
  canceledAt: BigInt!
  "Block/timestamp/tx of the first OFFER_TYPE_NEW for this agreement id."
  createdAtBlock: BigInt!
  createdAtTimestamp: BigInt!
  createdAtTx: Bytes!
}
